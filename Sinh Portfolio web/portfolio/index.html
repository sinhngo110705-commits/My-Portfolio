<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teemous Digital</title>
    <link rel="icon" href="../Logo/logo.png" type="image/png">
    <meta name="description" content="Discover talented creators and professionals on the TeemousDigital portfolio hub.">
    <link rel="stylesheet" href="../style.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap" rel="stylesheet">
</head>

<body class="light-mode">
    <canvas id="bg-canvas"></canvas>

    <main class="container">
        <!-- Global Navigation Header -->
        <header class="global-header">
            <div class="header-logo">
                <a href="../index.html">
                    <img src="../Logo/logo.png" alt="Teemous Digital" class="header-logo-img"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span style="display:none;">TD</span>
                </a>
            </div>

            <button class="mobile-menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="header-nav">
                <ul class="nav-links">
                    <li><a href="../index.html" data-en="Home" data-vi="Trang Chủ">Home</a></li>
                    <li><a href="../services/index.html" data-en="Service &amp; Shop" data-vi="Dịch vụ &amp; Cửa hàng">Service &amp; Shop</a></li>
                    <li><a href="index.html" class="active" data-en="Portfolio" data-vi="Hồ sơ Năng lực">Portfolio</a></li>
                    <li><a href="https://www.facebook.com/quang.sinh.5492" target="_blank" data-en="Contact Us" data-vi="Liên Hệ">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <!-- Hub Hero -->
        <section id="hero" class="section hero-section">
            <div class="hero-content">
                <h1 class="glitch" data-en="PORTFOLIO HUB" data-vi="TRUNG TÂM HỒ SƠ">PORTFOLIO HUB</h1>
                <p class="tagline" data-en="Explore Talents &amp; Creators" data-vi="Khám Phá Tài Năng &amp; Nhà Sáng Tạo">Explore Talents &amp; Creators</p>
            </div>
        </section>

        <!-- Filter System — Tier-based Category Only -->
        <section id="filters" class="section" style="padding-top: 0;">
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="filter-tier" data-en="Browse by Tier" data-vi="Lọc theo Cấp Độ">Browse by Tier</label>
                    <select id="filter-tier" class="glass-select">
                        <option value="all" data-en="All" data-vi="Tất cả">All</option>
                        <option value="elite" data-en="ELITE" data-vi="TINH HOA">ELITE</option>
                        <option value="impressive" data-en="IMPRESSIVE" data-vi="ẤN TƯỢNG">IMPRESSIVE</option>
                        <option value="professional" data-en="PROFESSIONAL" data-vi="CHUYÊN NGHIỆP">PROFESSIONAL</option>
                        <option value="standard" data-en="STANDARD" data-vi="TIÊU CHUẨN">STANDARD</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-field" data-en="Browse by Field" data-vi="Lọc theo Ngành Nghề">Browse by Field</label>
                    <select id="filter-field" class="glass-select">
                        <option value="all" data-en="All Fields" data-vi="Tất cả Ngành">All Fields</option>
                        <option value="digital-marketing" data-en="Digital Marketing" data-vi="Digital Marketing">Digital Marketing</option>
                        <option value="it" data-en="IT & Software" data-vi="Công nghệ & Phần mềm">IT & Software</option>
                        <option value="business" data-en="Business & Management" data-vi="Kinh doanh & Quản lý">Business & Management</option>
                        <option value="creative" data-en="Graphic Design & Creative" data-vi="Thiết kế & Sáng tạo">Graphic Design & Creative</option>
                        <option value="other" data-en="Other" data-vi="Khác">Other</option>
                    </select>
                </div>

            </div>
        </section>

        <!-- Tiered Layout -->
        <section id="portfolio-tiers" class="section">

            <!-- Elite Tier — Sinh (moved up) + Dương (new) -->
            <div class="tier-section" data-tier="elite">
                <h2 class="tier-heading elite" data-en="Elite" data-vi="Tinh Hoa">Elite</h2>
                <div class="avatar-grid">

                    <!-- Ngô Quang Sinh — moved from Impressive to Elite -->
                    <a href="ngoquangsinh/index.html" class="circular-avatar" data-tier="elite" data-field="digital-marketing">
                        <div class="avatar-wrapper">
                            <img src="https://scontent.fdad1-4.fna.fbcdn.net/v/t39.30808-6/646211181_1466823188411332_8165356710080014980_n.jpg?_nc_cat=100&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeFLkDHzzt3WbRROAQ_9zQCvHmnuGq0H0-Qeae4arQfT5JsP-wcdm0roFBTSYuQTlrb6G1tkz3vuVGWdFvbK_1Ty&_nc_ohc=OX00a6ZEt-8Q7kNvwFi4y5w&_nc_oc=Adk5J8zvSgBg0WEx6P0I5BDiQMJ5rpzJYyYffRhoZb0CaNEIU61TQnQ86X5CZ_icaio&_nc_zt=23&_nc_ht=scontent.fdad1-4.fna&_nc_gid=nsDfZrdtmJtk8b0jyBA2sg&_nc_ss=8&oh=00_AfySqcxpkQVp0eRIegJB63mPXhVrxcK20KH3VVfnYnWLcw&oe=69BE412E" alt="Avatar Ngo Quang Sinh">
                        </div>
                        <span class="avatar-name">Ngô Quang Sinh</span>
                    </a>

                    <!-- Trần Thị Thùy Dương — new ELITE member -->
                    <a href="tranthithuyduong/index.html" class="circular-avatar" data-tier="elite" data-field="it">
                        <div class="avatar-wrapper">
                            <img src="../Avatar/tttduong.jpg" alt="Avatar Trần Thị Thùy Dương"
                                onerror="this.src='../Avatar/tttduong.jpg'">
                        </div>
                        <span class="avatar-name">Trần Thị Thùy Dương</span>
                    </a>

                </div>
            </div>

            <!-- Impressive Tier — now empty of Sinh -->
            <div class="tier-section" data-tier="impressive">
                <h2 class="tier-heading impressive" data-en="Impressive" data-vi="Ấn Tượng">Impressive</h2>
                <div class="avatar-grid">
                    <a href="#" class="circular-avatar" data-tier="impressive" data-field="creative">
                        <div class="avatar-wrapper">
                            <img src="https://via.placeholder.com/150" alt="Placeholder Impressive">
                        </div>
                        <span class="avatar-name">John Smith</span>
                    </a>
                </div>
            </div>

            <!-- Professional Tier -->
            <div class="tier-section" data-tier="professional">
                <h2 class="tier-heading professional" data-en="Professional" data-vi="Chuyên Nghiệp">Professional</h2>
                <div class="avatar-grid">
                    <a href="#" class="circular-avatar" data-tier="professional" data-field="creative">
                        <div class="avatar-wrapper">
                            <img src="https://via.placeholder.com/150" alt="Placeholder Professional">
                        </div>
                        <span class="avatar-name">Alice Johnson</span>
                    </a>
                </div>
            </div>

            <!-- Standard Tier -->
            <div class="tier-section" data-tier="standard">
                <h2 class="tier-heading standard" data-en="Standard" data-vi="Tiêu Chuẩn">Standard</h2>
                <div class="avatar-grid">
                    <a href="#" class="circular-avatar" data-tier="standard" data-field="it">
                        <div class="avatar-wrapper">
                            <img src="https://via.placeholder.com/150" alt="Placeholder Standard">
                        </div>
                        <span class="avatar-name">Bob Williams</span>
                    </a>
                </div>
            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Teemous Digital. All Rights Reserved.</p>
        <div class="footer-socials">
            <a href="#" class="social-icon">Fb</a>
            <a href="#" class="social-icon">In</a>
            <a href="#" class="social-icon">Be</a>
        </div>
    </footer>

    <div class="ui-controls">
        <button id="theme-toggle" class="theme-toggle neon-border" title="Toggle Theme">
            <span class="mode-icon">☀️ Day</span>
        </button>
        <button id="lang-toggle" class="lang-toggle neon-border">
            Bạn là người Việt?
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="../script.js?v=4"></script>
</body>

</html>
