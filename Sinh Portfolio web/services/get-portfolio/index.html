        const html = htm.bind(React.createElement);

        const App = () => {

            const BASIC_PRICE = 49000;
            const PUSH_PRICE = 30000;
            const CARRY_PRICE = 299000;

            useEffect(() => {
                document.body.className = theme === 'light' ? 'light-mode' : 'dark';
                document.documentElement.className = theme === 'light' ? 'light' : 'dark';
                localStorage.setItem('td-theme', theme);

            useEffect(() => {
                localStorage.setItem('td-lang', lang);
            }, [lang]);

            // Background Particles with Mouse Tracking
            useEffect(() => {
                const canvas = document.getElementById('bg-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let width = (canvas.width = window.innerWidth);
                let height = (canvas.height = window.innerHeight);
                let particles = [];
                let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };
                let animationFrameId;

                const handleMouseMove = (e) => {
                    mouse.targetX = e.clientX;
                    mouse.targetY = e.clientY;
                };
                window.addEventListener('mousemove', handleMouseMove);

                const resize = () => {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                    init();
                };
                window.addEventListener('resize', resize);

                class Particle {
                    constructor() {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.baseX = this.x;
                        this.baseY = this.y;
                        this.size = Math.random() * 2;
                        this.density = (Math.random() * 20) + 1;
                        const colors = ['rgba(156, 39, 176, 0.4)', 'rgba(33, 150, 243, 0.4)'];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                    update() {
                        if (mouse.x !== null) {
                            let dx = mouse.x - width / 2;
                            let dy = mouse.y - height / 2;
                            let targetX = this.baseX - (dx * 0.05 * (30 / this.density));
                            let targetY = this.baseY - (dy * 0.05 * (30 / this.density));
                            this.x += (targetX - this.x) * 0.05;
                            this.y += (targetY - this.y) * 0.05;
                        }
                    }
                    draw() {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                const init = () => {
                    particles = [];
                    const numParticles = (width * height) / 8000;
                    for (let i = 0; i < numParticles; i++) particles.push(new Particle());
                };
                init();

                const drawGrid = () => {
                    if (mouse.x == null) return;
                    const dx = (mouse.x - width / 2) * 0.02;
                    const dy = (mouse.y - height / 2) * 0.02;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                    ctx.lineWidth = 1;
                    const gridSize = 50;
                    const offsetX = (dx % gridSize) - gridSize;
                    const offsetY = (dy % gridSize) - gridSize;
                    ctx.beginPath();
                    for (let x = offsetX; x < width + gridSize; x += gridSize) {
                        ctx.moveTo(x, 0); ctx.lineTo(x, height);
                    }
                    for (let y = offsetY; y < height + gridSize; y += gridSize) {
                        ctx.moveTo(0, y); ctx.lineTo(width, y);
                    }
                    ctx.stroke();
                };

                const connectParticles = () => {
                    for (let a = 0; a < particles.length; a++) {
                        for (let b = a; b < particles.length; b++) {
                            let dx = particles[a].x - particles[b].x;
                            let dy = particles[a].y - particles[b].y;
                            let distance = dx * dx + dy * dy;
                            if (distance < 15000) {
                                let opacity = 1 - (distance / 15000);
                                ctx.strokeStyle = `rgba(156, 39, 176, ${opacity * 0.2})`;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(particles[a].x, particles[a].y);
                                ctx.lineTo(particles[b].x, particles[b].y);
                                ctx.stroke();
                            }
                        }
                    }
                };

                const animate = () => {
                    ctx.clearRect(0, 0, width, height);

                    if (mouse.targetX !== null) {
                        mouse.x += (mouse.targetX - mouse.x) * 0.1;
                        mouse.y += (mouse.targetY - mouse.y) * 0.1;
                    }

                    drawGrid();

                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update();
                        particles[i].draw();
                    }

                    connectParticles();
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            const t = {

                    premium_desc: "Build giao diện custom riêng, phức tạp hơn. Trỏ tên miền cá nhân độc bản (VD: nguyenvana.com hoặc .id.vn).",

                    ui_preview: "Teemous Hub UI Preview",

                    option_carry: "The Carry Pack",

                    path_default: "Default path:",
                    deal: "Self-deal - Contact for quote",
                    add_top: "Add to Top Featured",
                    add_desc: "Your profile will be pinned in the Hub's most prominent area for 30 days, increasing clicks by 300%.",
                    ui_preview: "Teemous Hub UI Preview",
                    total_cost: "Total Cost",
                    voucher: "GIFT CODE",
                    send: "SEND INFO / CHAT VIA FACEBOOK",
                    home: "Home",

                    portfolio: "Portfolio Hub",
                    contact: "Contact Us",
                    plus: "+",
                    option_curation: "Portfolio Curation",
                    option_curation_desc: "Fine-tune info, digitize details, professional content optimization.<br/><i class='text-sm opacity-70'>Note: Part of the fee will be refunded if provided info is too sparse for effective optimization.</i>",
                    option_carry: "The Carry Pack",
                    option_carry_desc: "Complete A-Z consulting & execution. Just receive your Portfolio.",
                    only_one: "* Choose only one of two options",
                    custom_config: "CUSTOM CONFIGURATION",
                }

            const formatVNĐ = (num) => {
                if (typeof num === 'string') return num;
                return new Intl.NumberFormat('vi-VN').format(num) + ' VNĐ';
            };

            const calculateTotal = () => {
                if (selectedOption === 'premium') return 'Deal';
                let subtotal = BASIC_PRICE + (profilePush ? PUSH_PRICE : 0);
                if (basicSubOption === 'curation') subtotal += curationPrice;
                if (basicSubOption === 'carry') subtotal += CARRY_PRICE;
                return Math.max(0, subtotal - voucherDiscount);
            };

            const total = calculateTotal();

            const handleVoucher = (e) => {
                const val = e.target.value.toUpperCase();

                if (val === 'TEEMOUSFREE' || val === 'TEEMOUSNEW') {
