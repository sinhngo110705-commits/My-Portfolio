        html { font-size: 80%; }
        body { background-color: var(--bg-base); color: var(--text-main); transition: background-color 0.5s ease, color 0.5s ease; min-height: 100vh; position: relative; }
        .glass-panel-funnel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        .light-mode .glass-panel-funnel { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.1); }
        .plan-radio:checked+.plan-card { border-color: var(--neon-blue); background: rgba(33, 150, 243, 0.1); box-shadow: 0 0 30px rgba(33, 150, 243, 0.2); }
        .plan-radio:checked+.plan-card.premium { border-color: var(--neon-purple); background: rgba(156, 39, 176, 0.1); box-shadow: 0 0 30px rgba(156, 39, 176, 0.2); }
        @keyframes push-down { 0% { opacity: 0; transform: translateY(-30px); max-height: 0; overflow: hidden; } 100% { opacity: 1; transform: translateY(0); max-height: 1000px; overflow: visible; } }
        .animate-push-down { animation: push-down 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 0.25rem; background: rgba(33, 150, 243, 0.2); border-radius: 0.125rem; }
        input[type=range]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #2196F3; cursor: pointer; -webkit-appearance: none; margin-top: -7px; box-shadow: 0 0 10px rgba(33, 150, 243, 0.5); }
        @media (max-width: 640px) { html { zoom: 1 !important; } .plan-card { padding: 1.5rem !important; } }
        
        /* Global Header Specific Overrides for Get Portfolio */
        .global-header { position: sticky; top: 0; z-index: 1000; background: rgba(0,0,0,0.05); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .light-mode .global-header { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>

    <div id="root"></div>

    <script>
        const html = htm.bind(React.createElement);
        const { useState, useEffect } = React;

        const t = {
            vi: {
                title: "Khởi tạo Portfolio &",
                subtitle_hub: "Tham gia Teemous Hub",
                hero_desc: "Xây dựng định danh số chuyên nghiệp. Bắt đầu hành trình của bạn tại Teemous Digital.",
                basic: "Khởi tạo cơ bản",
                premium: "KHỞI TẠO NÂNG CAO",
                basic_desc: "Được thiết kế layout chuẩn chỉnh, đưa profile lên danh sách STANDARD hoặc PROFESSIONAL của Teemous Hub (Tùy năng lực).",
                premium_desc: "Build giao diện custom riêng, phức tạp hơn. Trỏ tên miền cá nhân độc bản (VD: nguyenvana.com hoặc .id.vn).",
                path_default: "Đường dẫn mặc định:",
                deal: "Tự deal - Liên hệ báo giá",
                add_top: "Thêm vào Top Featured",
                add_desc: "Profile của bạn sẽ được ghim trên khu vực nổi bật nhất của Hub trong 30 ngày, tăng 300% lượt click từ những người đang tìm kiếm nhân sự.",
                total_cost: "Tổng chi phí",
                voucher: "MÃ ƯU ĐÃI",
                send: "GỬI THÔNG TIN / CHAT QUA FACEBOOK",
                custom_config: "CẤU HÌNH TUỲ CHỈNH",
                option_curation: "Portfolio Curation",
                option_curation_desc: "Tinh chỉnh thông tin, số hóa cụ thể, tối ưu nội dung chuyên nghiệp.<br/><i class='text-sm opacity-70'>Lưu ý: Sẽ hoàn lại phí nếu lượng thông tin bạn cung cấp quá ít.</i>",
                option_carry: "The Carry Pack",
                option_carry_desc: "Tư vấn & thực hiện trọn gói từ A-Z. Bạn chỉ cần nhận Portfolio.",
            },
            en: {
                title: "Initialize Portfolio &",
                subtitle_hub: "Join Teemous Hub",
                hero_desc: "Build your professional digital portfolio. Start your journey at Teemous Digital.",
                basic: "Basic Initialization",
                premium: "Advanced Initialization",
                basic_desc: "Designed with standard layout, listed in STANDARD or PROFESSIONAL on Teemous Hub (based on capacity).",
                premium_desc: "Build custom interfaces, more complex. Point to a unique personal domain (e.g., nguyenvana.com or .id.vn).",
                path_default: "Default path:",
                deal: "Self-deal - Contact for quote",
                add_top: "Add to Top Featured",
                add_desc: "Your profile will be pinned in the Hub's most prominent area for 30 days, increasing clicks by 300%.",
                total_cost: "Total Cost",
                voucher: "GIFT CODE",
                send: "SEND INFO / CHAT VIA FACEBOOK",
                custom_config: "CUSTOM CONFIGURATION",
                option_curation: "Portfolio Curation",
                option_curation_desc: "Fine-tune info, digitize details, professional content optimization.<br/><i class='text-sm opacity-70'>Note: Fee refunded if provided info is too sparse.</i>",
                option_carry: "The Carry Pack",
                option_carry_desc: "Complete A-Z consulting & execution. Just receive your Portfolio.",
            }
        };

        const App = () => {
            const [selectedOption, setSelectedOption] = useState('basic');
            const [basicSubOption, setBasicSubOption] = useState(null);
            const [curationPrice, setCurationPrice] = useState(49000);
            const [profilePush, setProfilePush] = useState(false);
            const [voucher, setVoucher] = useState('');
            const [voucherDiscount, setVoucherDiscount] = useState(0);
            const [lang, setLang] = useState(localStorage.getItem('td-lang') || 'en');
            const [theme, setTheme] = useState(localStorage.getItem('td-theme') || 'dark');

            const BASIC_PRICE = 49000;
            const PUSH_PRICE = 30000;
            const CARRY_PRICE = 299000;

            useEffect(() => {
                const handleStorage = () => {
                    const nl = localStorage.getItem('td-lang');
                    const nt = localStorage.getItem('td-theme');
                    if (nl && nl !== lang) setLang(nl);
                    if (nt && nt !== theme) setTheme(nt);
                };
                window.addEventListener('storage', handleStorage);
                const interval = setInterval(handleStorage, 1000);
                return () => { clearInterval(interval); window.removeEventListener('storage', handleStorage); };
            }, [lang, theme]);

            useEffect(() => {
                const canvas = document.getElementById('bg-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let width = (canvas.width = window.innerWidth);
                let height = (canvas.height = window.innerHeight);
                let particles = [];
                let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };
                let animationFrameId;

                const handleMouseMove = (e) => { mouse.targetX = e.clientX; mouse.targetY = e.clientY; };
                window.addEventListener('mousemove', handleMouseMove);

                class Particle {
                    constructor() {
                        this.x = Math.random() * width; this.y = Math.random() * height;
                        this.baseX = this.x; this.baseY = this.y;
                        this.size = Math.random() * 2; this.density = (Math.random() * 20) + 1;
                        this.color = ['rgba(156, 39, 176, 0.4)', 'rgba(33, 150, 243, 0.4)'][Math.floor(Math.random()*2)];
                    }
                    update() {
                        let dx = mouse.x - width/2; let dy = mouse.y - height/2;
                        this.x = this.baseX - (dx * 0.05 * (30/this.density)); this.y = this.baseY - (dy * 0.05 * (30/this.density));
                    }
                    draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
                }

                const connect = () => {
                    for (let a = 0; a < particles.length; a++) {
                        for (let b = a; b < particles.length; b++) {
                            let dx = particles[a].x - particles[b].x; let dy = particles[a].y - particles[b].y;
                            let dist = dx*dx + dy*dy;
                            if (dist < 15000) { ctx.strokeStyle = `rgba(156,39,176,${1-(dist/15000)*0.1})`; ctx.beginPath(); ctx.moveTo(particles[a].x, particles[a].y); ctx.lineTo(particles[b].x, particles[b].y); ctx.stroke(); }
                        }
                    }
                }

                const init = () => { particles = []; for (let i = 0; i < (width*height)/9000; i++) particles.push(new Particle()); };
                init();

                const animate = () => {
                    ctx.clearRect(0,0,width,height);
                    mouse.x += (mouse.targetX - mouse.x) * 10.1; mouse.x = mouse.targetX; mouse.y = mouse.targetY; // Instant track for debug
                    particles.forEach(p => { p.update(); p.draw(); });
                    connect();
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();
                return () => { cancelAnimationFrame(animationFrameId); window.removeEventListener('mousemove', handleMouseMove); };
            }, []);

            const formatPrice = (num) => {
                if (typeof num === 'string') return num;
                return lang === 'en' ? `$${(num/25000).toFixed(0)}` : new Intl.NumberFormat('vi-VN').format(num) + ' VNĐ';
            };

            const calculateTotal = () => {
                if (selectedOption === 'premium') return 'Deal';
                let subtotal = BASIC_PRICE + (profilePush ? PUSH_PRICE : 0);
                if (basicSubOption === 'curation') subtotal += curationPrice;
                if (basicSubOption === 'carry') subtotal += CARRY_PRICE;
                return Math.max(0, subtotal - voucherDiscount);
            };

            return html`
                <main className="container mx-auto px-6 pt-32 pb-48 max-w-6xl">
                    <div className="text-center mb-24 animate-slide-up">
                        <h1 className="text-6xl md:text-8xl font-black uppercase mb-6 leading-tight">
                            ${t[lang].title} <br /> <span className="bg-gradient-to-r from-neon-blue to-neon-purple bg-clip-text text-transparent italic">${t[lang].subtitle_hub}</span>
                        </h1>
                        <p className="text-xl opacity-60 max-w-2xl mx-auto">${t[lang].hero_desc}</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-20">
                        <div className=${`p-12 glass-panel-funnel cursor-pointer border-2 transition-all relative ${selectedOption === 'basic' ? 'border-neon-blue bg-neon-blue/10 scale-[1.02] shadow-2xl' : 'border-white/5 opacity-50'}`} onClick=${()=>setSelectedOption('basic')}>
                            <span className="absolute top-4 right-4 bg-red-600 text-white font-black text-xs px-3 py-1 rounded-full animate-pulse shadow-2xl">-75% OFF</span>
                            <h3 className="text-3xl font-black mb-6 uppercase italic">${t[lang].basic}</h3>
                            <div className="flex items-center gap-4 mb-8">
                                <span className="text-2xl opacity-30 line-through">199,000 VNĐ</span>
                                <span className="text-5xl font-black text-neon-blue">49,000 VNĐ</span>
                            </div>
                            <p className="text-base opacity-70 mb-4">${t[lang].basic_desc}</p>
                            <div className="text-[10px] font-black uppercase tracking-widest opacity-40">
                                ${t[lang].path_default} teemous.id.vn/yourname
                            </div>
                        </div>
                        <div className=${`p-12 glass-panel-funnel cursor-pointer border-2 transition-all relative ${selectedOption === 'premium' ? 'border-neon-purple bg-neon-purple/10 scale-[1.02] shadow-2xl' : 'border-white/5 opacity-50'}`} onClick=${()=>setSelectedOption('premium')}>
                            <h3 className="text-3xl font-black mb-6 uppercase italic">${t[lang].premium}</h3>
                            <div className="text-5xl font-black mb-8 italic text-neon-purple">DEAL</div>
                            <p className="text-base opacity-70">${t[lang].premium_desc}</p>
                        </div>
                    </div>

                    ${selectedOption === 'basic' && html`
                        <div className="animate-push-down space-y-12">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="h-px bg-white/10 flex-1"></div>
                                <h2 className="text-neon-blue font-black uppercase tracking-[0.5em] text-[10px]">${t[lang].custom_config}</h2>
                                <div className="h-px bg-white/10 flex-1"></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <div className=${`p-8 glass-panel-funnel border-2 cursor-pointer transition-all ${basicSubOption === 'curation' ? 'border-neon-blue bg-neon-blue/10 shadow-[0_0_30px_rgba(33,150,243,0.3)]' : 'border-white/5 bg-black/20 hover:border-white/20'}`} onClick=${()=>setBasicSubOption('curation')}>
                                    <h4 className="text-2xl font-black italic mb-4">${t[lang].option_curation}</h4>
                                    <p className="text-sm opacity-60 mb-8" dangerouslySetInnerHTML=${{__html: t[lang].option_curation_desc}} />
                                    <input type="range" min="30000" max="249000" step="1000" value=${curationPrice} onChange=${(e)=>setCurationPrice(parseInt(e.target.value))} className="w-full mb-4" onClick=${(e)=>e.stopPropagation()} />
                                    <p className="text-center text-neon-blue font-black text-xl">${formatPrice(curationPrice)}</p>
                                </div>
                                <div className=${`p-8 glass-panel-funnel border-2 cursor-pointer transition-all ${basicSubOption === 'carry' ? 'border-neon-blue bg-neon-blue/10 shadow-[0_0_30px_rgba(33,150,243,0.3)]' : 'border-white/5 bg-black/20 hover:border-white/20'}`} onClick=${()=>setBasicSubOption('carry')}>
                                    <h4 className="text-2xl font-black italic mb-4">${t[lang].option_carry}</h4>
                                    <p className="text-sm opacity-60 mb-8">${t[lang].option_carry_desc}</p>
                                    <div className="p-4 border border-dashed border-white/20 rounded-xl text-center text-xs opacity-50">+ ${formatPrice(CARRY_PRICE)}</div>
                                </div>
                            </div>
                        </div>
                    `}

                    <div className="mt-24 p-12 glass-panel-funnel border-neon-blue/20 mb-20 flex items-center gap-10">
                        <label className="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked=${profilePush} onChange=${(e)=>setProfilePush(e.target.checked)} className="sr-only peer" />
                            <div className="w-14 h-7 bg-zinc-800 rounded-full peer peer-checked:bg-gradient-to-r peer-checked:from-neon-purple peer-checked:to-neon-blue after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:after:translate-x-full"></div>
                        </label>
                        <div>
                            <h3 className="text-2xl font-black uppercase mb-1">${t[lang].add_top}</h3>
                            <p className="opacity-50 text-sm italic tracking-wide">${t[lang].add_desc}</p>
                        </div>
                    </div>

                    <footer className="py-20 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.5em]">&copy; 2026 Teemous Digital. All Rights Reserved.</footer>

                    <div className="fixed bottom-0 left-0 right-0 p-8 z-[2000] bg-black/60 backdrop-blur-3xl border-t border-white/10 shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
                        <div className="container mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="text-center md:text-left">
                                <span className="text-[10px] uppercase font-black opacity-40 mb-1 block tracking-widest">${t[lang].total_cost}</span>
                                <span className="text-4xl font-black text-neon-blue drop-shadow-[0_0_15px_rgba(33,150,243,0.5)]">${formatPrice(calculateTotal())}</span>
                            </div>
                            <div className="flex gap-6 w-full md:w-auto">
                                <input type="text" placeholder=${t[lang].voucher} value=${voucher} onChange=${(e)=>setVoucher(e.target.value.toUpperCase())} className="bg-white/5 border border-white/10 px-8 py-4 rounded-xl uppercase font-black text-xs w-full md:w-48 focus:border-neon-blue" />
                                <a href="https://www.facebook.com/quang.sinh.5492" target="_blank" className="bg-white text-black px-12 py-4 rounded-xl font-black uppercase italic tracking-widest hover:bg-neon-blue hover:text-white transition-all transform hover:scale-105 active:scale-95 shadow-2xl whitespace-nowrap">
                                    ${t[lang].send}
                                </a>
                            </div>
                        </div>
                    </div>
                </main>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>

    <!-- TRULY RESTORED PREMIUM WIDGETS (STATIC DOM FOR SCRIPT.JS) -->
    <div class="ui-controls">
        <button id="theme-toggle" class="theme-toggle neon-border" title="Toggle Theme"><span class="mode-icon">🌙</span></button>
        <button id="lang-toggle" class="lang-toggle neon-border">EN</button>
    </div>

    <div id="chatbot-container">
        <button id="chatbot-toggle" class="neon-border" title="Chat with AI"><span class="chat-icon">💬</span></button>
        <div id="chatbot-window">
            <div class="chatbot-header glass-card"><div class="header-main"><h3>Teemous AI Assistant <span class="beta-badge">BETA</span></h3></div><button id="chatbot-close">✕</button></div>
            <div id="chatbot-messages" class="glass-card"><div class="message ai-message">Hello! I'm Teemous AI. How can I help you today?</div></div>

            <div id="auth-alert" class="auth-alert" style="display: none;"></div>
            <form id="auth-form" class="auth-form">
                <div id="login-section" class="auth-form-section active">
                    <h2 class="auth-title">Welcome Back</h2><p class="auth-subtitle">Access your Teemous Digital dashboard</p>
                    <div class="auth-input-group"><input type="email" id="login-email" placeholder="Email"></div>
                    <div class="auth-input-group"><input type="password" id="login-password" placeholder="Password"></div>
                    <button type="button" id="auth-submit-login" class="auth-submit-btn neon-border">Login</button>
                </div>

                    <h2 class="auth-title">Create Account</h2><p class="auth-subtitle">Join with us</p>
                    <div class="auth-input-group"><input type="text" id="signup-name" placeholder="Username"></div>
                    <div class="auth-input-group"><input type="email" id="signup-email" placeholder="Email"></div>
                    <div class="auth-input-group"><input type="password" id="signup-password" placeholder="Password"></div>
                    <div class="auth-input-group"><input type="password" id="signup-confirm" placeholder="Confirm Password"></div>
                    <button type="button" id="auth-submit-signup" class="auth-submit-btn neon-border">Initialize</button>
                </div>
            </form>
        </div>
    </div>
