<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Hub | Teemous Digital</title>
    <link rel="icon" href="../../Logo/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../../Logo/favicon.png">
    <link rel="canonical" href="https://teemousdigital.id.vn/services/get-portfolio/">
    <meta name="description"
        content="Initialize your professional digital portfolio with Teemous Digital. Expert personal branding.">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css?v=restore-elite-v6">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'neon-pink': '#E91E63',
                        'neon-purple': '#9C27B0',
                        'neon-blue': '#2196F3',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem('td-theme');
                if (savedTheme === 'light') document.documentElement.classList.add('light-mode');
            } catch (e) { }
        })();
    </script>

    <style>
        /* Prevent overlapping with the slim checkout bar */
        @media (max-width: 768px) {
            #chatbot-container {
                bottom: 5.5rem !important;
            }
            .ui-controls {
                bottom: 10.25rem !important;
            }
        }
    </style>
</head>

<body class="font-montserrat relative">
    <canvas id="bg-canvas" class="fixed inset-0 z-[-1] pointer-events-none"></canvas>

    <header class="global-header service-header">
        <div class="header-logo">
            <a href="../../index.html">
                <img src="../../Logo/logo.png" alt="Teemous Digital Logo" class="header-logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span style="display:none;">TD</span>
            </a>
        </div>
        <button class="mobile-menu-toggle" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="header-nav">
            <ul class="nav-links">
                <li><a href="../../index.html" data-en="Home" data-vi="Trang Chủ">Home</a></li>
                <li><a href="../../services/index.html" class="active" data-en="SERVICES & SHOP"
                        data-vi="Dịch vụ &amp; Cửa hàng">SERVICES & SHOP</a></li>
                <li><a href="../../portfolio/index.html" data-en="Portfolio Hub" data-vi="Hồ sơ Năng lực">Portfolio Hub</a></li>
                <li><a href="https://www.facebook.com/quang.sinh.5492" target="_blank" data-en="Contact Us"
                        data-vi="Liên Hệ">Contact Us</a></li>
                <li><button id="nav-login-btn" class="nav-login-btn neon-border" data-en="Login | Sign Up"
                        data-vi="Đăng Nhập | Đăng Ký"></button></li>
            </ul>
        </nav>
    </header>

    <div id="root"></div>

    <script>
        const html = htm.bind(React.createElement);
        const { useState, useEffect } = React;

        const t = {
            vi: {
                title: "KHỞI TẠO PORTFOLIO &",
                subtitle: "THAM GIA TEEMOUS HUB",
                desc: "Xây dựng định danh số chuyên nghiệp. Bắt đầu hành trình của bạn tại Teemous Digital.",
                basic: "KHỞI TẠO CƠ BẢN",
                premium: "KHỞI TẠO NÂNG CAO",
                basic_desc: "Được thiết kế layout chuẩn chỉnh, đưa profile lên danh sách STANDARD hoặc PROFESSIONAL của Teemous Hub (Tùy năng lực).",
                premium_desc: "Chuyên biệt hóa giao diện, thêm tính năng 3D. Trỏ tên miền cá nhân độc bản (VD: nguyenvana.com hoặc .id.vn).",
                cost: "TỔNG CHI PHÍ",
                send: "GỬI THÔNG TIN / CHAT QUA FB",
                deal: "TỰ DEAL - LIÊN HỆ GẤP",
                custom: "Tùy Chọn Bổ Sung",
                push: "Đẩy Lên Top Featured (30 Ngày)",
                voucher: "Mã Ưu Đãi",
                applied: "Đã áp dụng"
            },
            en: {
                title: "INITIALIZE PORTFOLIO &",
                subtitle: "JOIN TEEMOUS HUB",
                desc: "Build your professional digital identity. Start your journey at Teemous Digital.",
                basic: "BASIC INCUBATION",
                premium: "ADVANCED CUSTOM",
                basic_desc: "Clean layout, added to STANDARD or PROFESSIONAL tiers on Teemous Hub based on your current capacity.",
                premium_desc: "Bespoke interface, 3D elements, and your own unique domain name (e.g., yourname.com).",
                cost: "TOTAL COST",
                send: "SEND INFO / CHAT VIA FB",
                deal: "CUSTOM DEAL - CONTACT US",
                custom: "Additional Options",
                push: "Push to Top Featured (30 Days)",
                voucher: "Voucher Code",
                applied: "Applied"
            }
        };

        const App = () => {
            const [lang, setLang] = useState(localStorage.getItem('td-lang') || 'en');
            const [plan, setPlan] = useState(null);
            const [push, setPush] = useState(false);
            const [voucher, setVoucher] = useState('');
            
            useEffect(() => {
                const handleState = () => {
                    const nl = localStorage.getItem('td-lang');
                    if (nl && nl !== lang) setLang(nl);
                };
                window.addEventListener('td-state-change', handleState);
                return () => window.removeEventListener('td-state-change', handleState);
            }, [lang]);

            // GSAP Entry Animation
            useEffect(() => {
                if (window.gsap) {
                    window.gsap.fromTo('.hero-anim-text', {
                        y: 30,
                        opacity: 0,
                    }, {
                        y: 0,
                        opacity: 1,
                        duration: 0.8,
                        stagger: 0.15,
                        ease: 'power3.out'
                    });
                }
            }, [lang]);

            const basicPrice = 49000;
            const pushPrice = 30000;
            const validVouchers = ['SINHDEV', 'SINHVO', 'TEEMOUS49K', 'KSDN', 'KSDNSTUDIO'];
            const discount = validVouchers.includes(voucher) ? 49000 : 0;

            const total = Math.max(0, basicPrice + (push ? pushPrice : 0) - discount);

            const format = (num) => lang === 'en' ? `$${(num / 25000).toFixed(0)}` : new Intl.NumberFormat('vi-VN').format(num) + ' VNĐ';

            return html`
                <main className="container mx-auto px-4 pt-32 pb-48 md:pb-32 max-w-5xl">
                    <div className="text-center mb-16 mt-6 md:mt-12">
                        <h1 className="text-4xl md:text-6xl font-black mb-4 flex flex-col items-center justify-center">
                            <span className="hero-anim-text opacity-90 dark:text-white block mb-2">${t[lang].title}</span>
                            <span className="hero-anim-text text-transparent bg-clip-text bg-gradient-brand italic drop-shadow-lg block leading-normal py-2 pr-4 pl-2">${t[lang].subtitle}</span>
                        </h1>
                        <p className="hero-anim-text opacity-60 max-w-xl mx-auto md:text-lg px-2">${t[lang].desc}</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
                        <div onClick=${() => setPlan('basic')} className=${`glass-panel-funnel p-8 cursor-pointer transition-all border-2 ${plan === 'basic' ? 'border-neon-blue shadow-[0_0_40px_rgba(33,150,243,0.3)] bg-neon-blue/5' : 'border-transparent'}`}>
                            <h3 className="text-2xl font-black italic mb-2 uppercase">${t[lang].basic}</h3>
                            <div className="text-3xl font-black text-neon-blue mb-4">${format(basicPrice)}</div>
                            <p className="opacity-70 text-sm leading-relaxed">${t[lang].basic_desc}</p>
                        </div>
                        <div onClick=${() => setPlan('premium')} className=${`premium-card-wrapper ${plan === 'premium' ? 'selected' : ''}`}>
                            <div className="premium-card-inner p-8">
                                <h3 className="text-2xl font-black italic mb-2 uppercase">${t[lang].premium}</h3>
                                <div className="text-3xl font-black text-neon-purple mb-4">DEAL</div>
                                <p className="opacity-70 text-sm leading-relaxed">${t[lang].premium_desc}</p>
                            </div>
                        </div>
                    </div>

                    ${plan === 'basic' && html`
                        <div className="animate-push-down max-w-2xl mx-auto mb-16 flex flex-col gap-6">
                            <div className="glass-panel-funnel p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                                <div>
                                    <h4 className="font-black text-lg mb-1">${t[lang].push}</h4>
                                    <p className="opacity-50 text-xs">+${format(pushPrice)}</p>
                                </div>
                                <label className="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" checked=${push} onChange=${() => setPush(!push)} className="sr-only peer" />
                                    <div className="w-11 h-6 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all" style=${{ background: push ? 'var(--neon-blue)' : 'var(--glass-border)' }}></div>
                                </label>
                            </div>

                            <div className="glass-panel-funnel p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                                <div>
                                    <h4 className="font-black text-lg mb-1">${t[lang].voucher}</h4>
                                </div>
                                <div className="flex-1 w-full md:max-w-xs relative">
                                    <input type="text" placeholder=${t[lang].voucher} value=${voucher} onChange=${(e) => setVoucher(e.target.value.toUpperCase())} className="w-full bg-transparent border rounded-xl px-4 py-3 text-sm font-black uppercase text-center focus:border-neon-blue outline-none transition-all" style=${{ borderColor: 'var(--glass-border)', color: 'var(--text-main)', background: 'var(--bg-alt)' }} />
                                    ${discount > 0 ? html`<span className="absolute right-3 top-1/2 -translate-y-1/2 text-[9px] text-green-400 font-black animate-pulse">${t[lang].applied}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `}

                    ${plan && html`
                        <div className="fixed bottom-0 left-0 right-0 md:bottom-8 md:left-1/2 md:-translate-x-1/2 md:w-[90%] md:max-w-4xl z-[2000] p-4 md:p-6 animate-push-down flex flex-row items-center justify-between gap-4 md:rounded-2xl" style=${{ background: 'var(--glass-bg)', backdropFilter: 'blur(20px)', borderTop: '1px solid var(--glass-border)', boxShadow: '0 -10px 40px rgba(0,0,0,0.15)' }}>
                            <div className="flex flex-col flex-shrink-0">
                                <div className="text-[10px] uppercase font-black opacity-40 mb-0.5">${t[lang].cost}</div>
                                <div className="text-xl md:text-4xl font-black text-neon-blue drop-shadow-[0_0_15px_rgba(33,150,243,0.5)]">
                                    ${plan === 'premium' ? 'DEAL' : format(total)}
                                </div>
                            </div>

                            <a href="https://www.facebook.com/quang.sinh.5492" target="_blank" className="font-black uppercase italic tracking-wider px-6 py-3 md:px-8 md:py-4 rounded-xl hover:bg-neon-blue hover:text-white transition-all transform hover:scale-105 shadow-xl flex-shrink-0 border hover:border-transparent text-[0.8rem] md:text-sm" style=${{ background: 'var(--text-main)', color: 'var(--bg-base)', borderColor: 'var(--glass-border)' }}>
                                ${plan === 'premium' ? t[lang].deal : t[lang].send}
                            </a>
                        </div>
                    `}
                </main>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>

    <div class="ui-controls">
        <button id="theme-toggle" class="theme-toggle neon-border" title="Toggle Theme"><span class="mode-icon">🌙</span></button>
        <button id="lang-toggle" class="lang-toggle neon-border">EN</button>
    </div>

    <div id="chatbot-container">
        <button id="chatbot-toggle" class="neon-border" title="Chat with AI"><span class="chat-icon">💬</span></button>
        <div id="chatbot-window">
            <div class="chatbot-header glass-card">
                <div class="header-main">
                    <h3 data-en="Teemous AI Assistant" data-vi="Trợ lý ảo Teemous">Teemous AI Assistant <span class="beta-badge">BETA</span></h3>
                </div><button id="chatbot-close">✕</button>
            </div>
            <div id="chatbot-messages" class="glass-card">
                <div class="message ai-message" data-en="Hello! I'm Teemous AI. How can I help you today?" data-vi="Xin chào! Tôi là AI từ Teemous. Tôi có thể giúp gì cho bạn?">Hello! I'm Teemous AI. How can I help you today?</div>
            </div>
            <div class="chatbot-input-area glass-card">
                <input type="text" id="chatbot-input" placeholder="Type a message..." data-en-placeholder="Type a message..." data-vi-placeholder="Nhập tin nhắn...">
                <button id="chatbot-send">➤</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="auth-modal-overlay" class="auth-modal-overlay" style="display:none;"><div id="auth-modal" class="auth-modal-container glass-card"><button id="close-auth-modal" class="close-modal-btn">✕</button><div class="auth-tab-nav"><button id="tab-login" class="active">Login</button><button id="tab-signup">Sign Up</button></div><div id="auth-alert" class="auth-alert" style="display: none;"></div><form id="auth-form" class="auth-form"><div id="login-section" class="auth-form-section active"><div class="auth-input-group"><input type="email" id="login-email" placeholder="Email"></div><div class="auth-input-group"><input type="password" id="login-password" placeholder="Password"></div><button type="button" id="auth-submit-login" class="auth-submit-btn neon-border">Login</button></div><div id="signup-section" class="auth-form-section" style="display: none;"><div class="auth-input-group"><input type="text" id="signup-name" placeholder="Username"></div><div class="auth-input-group"><input type="email" id="signup-email" placeholder="Email"></div><div class="auth-input-group"><input type="password" id="signup-password" placeholder="Password"></div><div class="auth-input-group"><input type="password" id="signup-confirm" placeholder="Confirm Password"></div><button type="button" id="auth-submit-signup" class="auth-submit-btn neon-border">Initialize</button></div></form></div></div>

    <div id="dashboard-modal-overlay" class="auth-modal-overlay" style="display:none;"><div id="dashboard-modal" class="auth-modal-container dashboard-modal glass-card"><button id="close-dashboard-modal" class="close-modal-btn">✕</button><div class="dashboard-tabs"><button class="dash-tab active" data-tab="profile">Profile</button></div><div class="dashboard-content-scrollable"><div id="tab-profile" class="dash-section active"><img id="dashboard-avatar" src="" alt="Avatar" class="dashboard-avatar-img"><input type="text" id="dashboard-username-input"><button id="save-profile-btn">💾</button><p id="dashboard-email"></p><span id="dashboard-balance"></span><span id="dashboard-role"></span><button id="logout-btn">Log Out</button></div></div></div></div>

    <script src="../../script.js?v=restore-elite-v6"></script>
</body>
</html>
