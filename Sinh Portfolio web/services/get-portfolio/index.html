<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your Portfolio | Teemous Digital</title>
    <link rel="icon" href="../../Logo/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../../Logo/favicon.png">
    <link rel="canonical" href="https://teemousdigital.id.vn/services/get-portfolio/">
    <meta name="description" content="Initialize your personal portfolio and join the Teemous Digital creative ecosystem.">

    <!-- Site Name for Search Results -->
    <meta name="application-name" content="Teemous Digital">
    <meta name="apple-mobile-web-app-title" content="Teemous Digital">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://teemousdigital.id.vn/services/get-portfolio/">
    <meta property="og:site_name" content="Teemous Digital">
    <meta property="og:title" content="Get Started | Teemous Digital">
    <meta property="og:description" content="Initialize your personal portfolio on Teemous Digital.">
    <meta property="og:image" content="https://teemousdigital.id.vn/Logo/logo.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://teemousdigital.id.vn/services/get-portfolio/">
    <meta property="twitter:title" content="Get Started | Teemous Digital">
    <meta property="twitter:description" content="Join Teemous Digital Creative Ecosystem today.">
    <meta property="twitter:image" content="https://teemousdigital.id.vn/Logo/logo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css?v=restore-elite-v4">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'neon-pink': '#E91E63',
                        'neon-purple': '#9C27B0',
                        'neon-blue': '#2196F3',
                        'neon-gold': '#FFD700',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    },
                    backgroundImage: {
                        'gradient-brand': 'linear-gradient(135deg, #E91E63, #9C27B0, #2196F3)',
                    }
                }
            }
        }
    </script>

    <!-- React & HTM (No-build JSX alternative) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <style>
        html {
            font-size: 80%;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .glass-panel-funnel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
        }

        .light-mode .glass-panel-funnel {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .plan-radio:checked+.plan-card {
            border-color: var(--neon-blue);
            background: rgba(33, 150, 243, 0.1);
            box-shadow: 0 0 30px rgba(33, 150, 243, 0.2);
        }

        @keyframes push-down {
            0% { opacity: 0; transform: translateY(-30px); max-height: 0; overflow: hidden; }
            100% { opacity: 1; transform: translateY(0); max-height: 1000px; overflow: visible; }
        }

        .animate-push-down {
            animation: push-down 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 0.25rem;
            background: rgba(33, 150, 243, 0.2);
            border-radius: 0.125rem;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #2196F3;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -7px;
        }
    </style>

    <script>
        (function() {
            try {
                const savedTheme = localStorage.getItem('td-theme');
                if (savedTheme === 'light') {
                    document.documentElement.classList.add('light-mode');
                }
            } catch (e) {}
        })();
    </script>
</head>

<body>
    <div id="root"></div>

    <script>
        const html = htm.bind(React.createElement);
        const { useState, useEffect } = React;

        const t = {
            vi: {
                title: "Khởi tạo Portfolio &",
                subtitle_hub: "Tham gia Teemous Hub",
                hero_desc: "Xây dựng định danh số chuyên nghiệp. Bắt đầu hành trình của bạn tại Teemous Digital.",
                basic: "Khởi tạo cơ bản",
                premium: "KHỞI TẠO NÂNG CAO",
                basic_desc: "Được thiết kế layout chuẩn chỉnh, đưa profile lên danh sách STANDARD hoặc PROFESSIONAL của Teemous Hub (Tùy năng lực).",
                premium_desc: "Build giao diện custom riêng, phức tạp hơn. Trỏ tên miền cá nhân độc bản (VD: nguyenvana.com hoặc .id.vn).",
                path_default: "Đường dẫn mặc định:",
                deal: "Tự deal - Liên hệ báo giá",
                add_top: "Thêm vào Top Featured",
                add_desc: "Profile của bạn sẽ được ghim trên khu vực nổi bật nhất của Hub trong 30 ngày, tăng 300% lượt click từ những người đang tìm kiếm nhân sự.",
                total_cost: "Tổng chi phí",
                voucher: "MÃ ƯU ĐÃI",
                send: "GỬI THÔNG TIN / CHAT QUA FACEBOOK",
                custom_config: "CẤU HÌNH TUỲ CHỈNH",
                option_curation: "Portfolio Curation",
                option_curation_desc: "Tinh chỉnh thông tin, số hóa cụ thể, tối ưu nội dung chuyên nghiệp.<br/><i class='text-sm opacity-70'>Lưu ý: Sẽ hoàn lại phí if provided info is too sparse.</i>",
                option_carry: "The Carry Pack",
                option_carry_desc: "Tư vấn & thực hiện trọn gói từ A-Z. Bạn chỉ cần nhận Portfolio.",
            },
            en: {
                title: "Initialize Portfolio &",
                subtitle_hub: "Join Teemous Hub",
                hero_desc: "Build your professional digital portfolio. Start your journey at Teemous Digital.",
                basic: "Basic Initialization",
                premium: "Advanced Initialization",
                basic_desc: "Designed with standard layout, listed in STANDARD or PROFESSIONAL on Teemous Hub.",
                premium_desc: "Build custom interfaces, more complex. Point to a unique personal domain.",
                path_default: "Default path:",
                deal: "Self-deal - Contact for quote",
                add_top: "Add to Top Featured",
                add_desc: "Your profile will be pinned in the Hub's most prominent area for 30 days.",
                total_cost: "Total Cost",
                voucher: "GIFT CODE",
                send: "SEND INFO / CHAT VIA FACEBOOK",
                custom_config: "CUSTOM CONFIGURATION",
                option_curation: "Portfolio Curation",
                option_curation_desc: "Fine-tune info, digitize details, professional content optimization.",
                option_carry: "The Carry Pack",
                option_carry_desc: "Complete A-Z consulting & execution. Just receive your Portfolio.",
            }
        };

        const App = () => {
            const [selectedOption, setSelectedOption] = useState('basic');
            const [basicSubOption, setBasicSubOption] = useState(null);
            const [curationPrice, setCurationPrice] = useState(29000);
            const [profilePush, setProfilePush] = useState(false);
            const [voucher, setVoucher] = useState('');
            const [voucherDiscount, setVoucherDiscount] = useState(0);
            const [lang, setLang] = useState(localStorage.getItem('td-lang') || 'en');
            const [theme, setTheme] = useState(localStorage.getItem('td-theme') || 'dark');

            const BASIC_PRICE = 49000;
            const PUSH_PRICE = 30000;
            const CARRY_PRICE = 299000;

            useEffect(() => {
                const handleStorage = () => {
                    const nl = localStorage.getItem('td-lang');
                    const nt = localStorage.getItem('td-theme');
                    if (nl && nl !== lang) setLang(nl);
                    if (nt && nt !== theme) setTheme(nt);
                };
                window.addEventListener('storage', handleStorage);
                const interval = setInterval(handleStorage, 1000);
                return () => { clearInterval(interval); window.removeEventListener('storage', handleStorage); };
            }, [lang, theme]);

            const formatPrice = (num) => {
                if (typeof num === 'string') return num;
                return lang === 'en' ? `$${(num/25000).toFixed(0)}` : new Intl.NumberFormat('vi-VN').format(num) + ' VNĐ';
            };

            const calculateTotal = () => {
                if (selectedOption === 'premium') return 'Deal';
                let subtotal = BASIC_PRICE + (profilePush ? PUSH_PRICE : 0);
                if (basicSubOption === 'curation') subtotal += curationPrice;
                if (basicSubOption === 'carry') subtotal += CARRY_PRICE;
                return Math.max(0, subtotal - voucherDiscount);
            };

            const total = calculateTotal();

            const handleVoucher = (e) => {
                const val = e.target.value.toUpperCase();
                setVoucher(val);
                if (['SINHDEV', 'SINHVO'].includes(val)) setVoucherDiscount(49000);
                else setVoucherDiscount(0);
            };

            return html`
                <div className="min-h-screen pb-48 font-montserrat bg-[var(--bg-base)] text-[var(--text-main)]">
                    <header class="p-6 flex justify-between items-center border-b border-white/5">
                        <a href="../../index.html"><img src="../../Logo/logo.png" class="h-8" /></a>
                        <nav class="hidden md:flex gap-8 uppercase text-xs font-black tracking-widest">
                            <a href="../../index.html">Home</a>
                            <a href="../../services/index.html" class="text-neon-blue">Services</a>
                            <a href="../../portfolio/index.html">Portfolio</a>
                        </nav>
                    </header>

                    <main class="container mx-auto px-6 pt-24 pb-12 max-w-5xl">
                        <h1 class="text-5xl md:text-7xl font-black uppercase text-center mb-12">
                            ${t[lang].title} <br/> <span class="text-neon-blue">${t[lang].subtitle_hub}</span>
                        </h1>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
                            <div class=${`p-8 glass-panel-funnel border-2 cursor-pointer transition-all ${selectedOption === 'basic' ? 'border-neon-blue' : 'border-transparent'}`} onClick=${()=>setSelectedOption('basic')}>
                                <h3 class="text-2xl font-black mb-4 uppercase italic gold-gradient-text">${t[lang].basic}</h3>
                                <p class="text-4xl font-black text-neon-blue mb-4">49,000đ</p>
                                <p class="text-sm opacity-70">${t[lang].basic_desc}</p>
                            </div>
                            <div class=${`p-8 glass-panel-funnel border-2 cursor-pointer transition-all ${selectedOption === 'premium' ? 'border-neon-purple' : 'border-transparent'}`} onClick=${()=>setSelectedOption('premium')}>
                                <h3 class="text-2xl font-black mb-4 uppercase italic">${t[lang].premium}</h3>
                                <p class="text-4xl font-black text-neon-purple mb-4">Deal</p>
                                <p class="text-sm opacity-70">${t[lang].premium_desc}</p>
                            </div>
                        </div>

                        ${selectedOption === 'basic' && html`
                            <div class="animate-push-down">
                                <h2 class="text-center orange-gradient-text font-black uppercase tracking-widest mb-8 text-xs">${t[lang].custom_config}</h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div class=${`p-6 glass-panel-funnel border-2 cursor-pointer ${basicSubOption === 'curation' ? 'border-neon-blue' : 'border-transparent'}`} onClick=${()=>setBasicSubOption('curation')}>
                                        <h4 class="font-black mb-2">${t[lang].option_curation}</h4>
                                        <p class="text-xs opacity-60 mb-4" dangerouslySetInnerHTML=${{__html: t[lang].option_curation_desc}} />
                                        <input type="range" min="29000" max="249000" step="1000" value=${curationPrice} onChange=${(e)=>setCurationPrice(parseInt(e.target.value))} class="w-full" />
                                        <p class="text-center mt-4 font-black">${formatPrice(curationPrice)}</p>
                                    </div>
                                    <div class=${`p-6 glass-panel-funnel border-2 cursor-pointer ${basicSubOption === 'carry' ? 'border-neon-blue' : 'border-transparent'}`} onClick=${()=>setBasicSubOption('carry')}>
                                        <h4 class="font-black mb-2">${t[lang].option_carry}</h4>
                                        <p class="text-xs opacity-60 mb-4">${t[lang].option_carry_desc}</p>
                                        <div class="text-center p-3 border border-dashed border-white/20 rounded-lg text-xs">+ ${formatPrice(CARRY_PRICE)}</div>
                                    </div>
                                </div>
                            </div>
                        `}

                        <div class="mt-16 p-8 glass-panel-funnel border border-neon-blue/20">
                           <div class="flex items-center gap-6">
                                <input type="checkbox" checked=${profilePush} onChange=${(e)=>setProfilePush(e.target.checked)} class="w-6 h-6" />
                                <div>
                                    <h3 class="font-black uppercase">${t[lang].add_top}</h3>
                                    <p class="text-sm opacity-60">${t[lang].add_desc}</p>
                                </div>
                           </div>
                        </div>
                    </main>

                    <div class="fixed bottom-0 left-0 right-0 p-6 bg-black/80 backdrop-blur-xl border-t border-white/10 z-[100]">
                        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <span class="text-[10px] uppercase opacity-50 block">${t[lang].total_cost}</span>
                                <span class="text-3xl font-black text-neon-blue">${formatPrice(total)}</span>
                            </div>
                            <div class="flex gap-4">
                                <input type="text" placeholder=${t[lang].voucher} value=${voucher} onChange=${handleVoucher} class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg text-sm w-32 uppercase font-black" />
                                <a href="https://www.facebook.com/quang.sinh.5492" target="_blank" class="bg-white text-black px-8 py-3 rounded-lg font-black uppercase text-sm hover:bg-neon-blue hover:text-white transition-all">
                                    ${t[lang].send}
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>

    <!-- Chatbot & Auth Modals (Persistent UI) -->
    <script src="../../script.js?v=restore-elite-v4"></script>
</body>
</html>
