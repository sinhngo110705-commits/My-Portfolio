        const App = () => {

            const [theme, setTheme] = useState(localStorage.getItem('td-theme') || 'dark');

            const BASIC_PRICE = 49000;
            const PUSH_PRICE = 30000;

            useEffect(() => {

                document.documentElement.className = theme === 'light' ? 'light' : 'dark';
                localStorage.setItem('td-theme', theme);
            }, [theme]);

            // Background Particles with Mouse Tracking (Synced with main site)
            useEffect(() => {
                const canvas = document.getElementById('bg-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let width = (canvas.width = window.innerWidth);
                let height = (canvas.height = window.innerHeight);
                let particles = [];
                let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

                const handleMouseMove = (e) => {
                    mouse.targetX = e.clientX;
                    mouse.targetY = e.clientY;
                };
                window.addEventListener('mousemove', handleMouseMove);

                const resize = () => {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                    init();
                };
                window.addEventListener('resize', resize);

                class Particle {
                    constructor() {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.baseX = this.x;
                        this.baseY = this.y;
                        this.size = Math.random() * 2;
                        this.density = (Math.random() * 20) + 1;
                        const colors = ['rgba(156, 39, 176, 0.8)', 'rgba(33, 150, 243, 0.8)'];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                    update() {
                        let dx = mouse.x - width / 2;
                        let dy = mouse.y - height / 2;
                        let targetX = this.baseX - (dx * 0.05 * (30 / this.density));
                        let targetY = this.baseY - (dy * 0.05 * (30 / this.density));
                        this.x += (targetX - this.x) * 0.05;
                        this.y += (targetY - this.y) * 0.05;
                    }
                    draw() {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                const init = () => {
                    particles = [];
                    const numParticles = (width * height) / 6000;
                    for (let i = 0; i < numParticles; i++) particles.push(new Particle());
                };
                init();

                const drawGrid = () => {
                    if (mouse.x == null) return;
                    const dx = (mouse.x - width / 2) * 0.02;
                    const dy = (mouse.y - height / 2) * 0.02;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                    ctx.lineWidth = 1;
                    const gridSize = 50;
                    const offsetX = (dx % gridSize) - gridSize;
                    const offsetY = (dy % gridSize) - gridSize;
                    ctx.beginPath();
                    for (let x = offsetX; x < width + gridSize; x += gridSize) {
                        ctx.moveTo(x, 0); ctx.lineTo(x, height);
                    }
                    for (let y = offsetY; y < height + gridSize; y += gridSize) {
                        ctx.moveTo(0, y); ctx.lineTo(width, y);
                    }
                    ctx.stroke();
                };

                const connectParticles = () => {
                    for (let a = 0; a < particles.length; a++) {
                        for (let b = a; b < particles.length; b++) {
                            let dx = particles[a].x - particles[b].x;
                            let dy = particles[a].y - particles[b].y;
                            let distance = dx * dx + dy * dy;
                            if (distance < 15000) {
                                let opacity = 1 - (distance / 15000);
                                ctx.strokeStyle = `rgba(156, 39, 176, ${opacity * 0.2})`;
                                ctx.lineWidth = 1;
                                ctx.beginPath();
                                ctx.moveTo(particles[a].x, particles[a].y);
                                ctx.lineTo(particles[b].x, particles[b].y);
                                ctx.stroke();
                            }
                        }
                    }
                };

                let animationFrameId;
                const animate = () => {
                    ctx.clearRect(0, 0, width, height);
                    mouse.x += (mouse.targetX - mouse.x) * 0.1;
                    mouse.y += (mouse.targetY - mouse.y) * 0.1;
                    drawGrid();
                    particles.forEach(p => {
                        p.update();
                        p.draw();
                    });
                    connectParticles();
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('resize', resize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

                    <div className="footer-socials">
                        <a href="#" className="social-icon">Fb</a>
                        <a href="#" className="social-icon">In</a>
                        <a href="#" className="social-icon">Be</a>
                    </div>
                </footer>
            `;

            const renderUIControls = () => html`
                <div className="ui-controls">
                    <button id="theme-toggle" onClick=${() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="theme-toggle neon-border" title=${lang === 'vi' ? 'Chế độ' : 'Toggle Theme'}>
                        <span className="mode-icon">${theme === 'dark' ? (lang === 'en' ? '🌙 Night' : '🌙 Đêm') : (lang === 'en' ? '☀️ Day' : '☀️ Ngày')}</span>
                    </button>
                    <button id="lang-toggle" onClick=${() => setLang(lang === 'en' ? 'vi' : 'en')} className="lang-toggle neon-border">
                        ${lang === 'en' ? 'Bạn là người Việt?' : 'Having difficulty with Vietnamese?'}
                    </button>
                </div>
            `;

            return html`
                <div className="min-h-screen pb-48 relative font-montserrat overflow-hidden">
                    <canvas id="bg-canvas" className="fixed inset-0 z-[-1] pointer-events-none opacity-50"></canvas>
                    
                    ${renderHeader()}
                    ${renderHero()}

                    <main className="container mx-auto px-6 max-w-6xl">
                        ${renderPlans()}
                        ${renderPush()}
                        ${renderCheckout()}
                    </main>

                    ${renderFooter()}
                    ${renderUIControls()}
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="../../script.js?v=6"></script>
</body>

</html>
